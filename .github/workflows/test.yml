name: test
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  # Build, vet, and run the whole suite across the supported Go floor + latest on
  # all three OSes. The race detector runs on Linux and macOS (it needs cgo);
  # Windows runs the suite without it.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.18', 'stable']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: go vet
        run: go vet ./...
      - name: go test (race)
        if: runner.os != 'Windows'
        run: go test -race ./... -count=1
      - name: go test
        if: runner.os == 'Windows'
        run: go test ./... -count=1

  # Characterization goldens (help output, etc.) must be regenerated and
  # committed with any change that affects them.
  golden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: characterization goldens are current
        run: |
          go test -run Characterization -update-golden .
          if [ -n "$(git status --porcelain -- testdata/)" ]; then
            echo "::error::characterization goldens are out of date. Run: go test -run Characterization -update-golden ."
            git diff -- testdata/
            exit 1
          fi
